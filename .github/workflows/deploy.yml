- name: Deploy via SSH
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.VM_HOST }}
    username: ${{ secrets.VM_USER }}
    key: ${{ secrets.VM_SSH_KEY }}
    script: |
      echo "Connected to VM"
      whoami
      hostname
      echo "HOME:"
      echo $HOME
      echo "Current directory:"
      pwd
      echo "Files in HOME:"
      ls -la $HOME